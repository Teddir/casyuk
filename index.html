<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CasYuk</title>
  </head>

  <body>
    <div id="root">
      <style>
        :root {
          --bg-splash: #f6f6f9;
          --pattern-color: rgba(0, 0, 0, 0.15);
        }
        @keyframes battery-fill {
          0% { width: 10%; background-color: #ffb3b3; }
          50% { width: 50%; background-color: #ffebb3; }
          100% { width: 100%; background-color: #a6f6d0; }
        }
        @keyframes pulse-logo {
          0% { transform: scale(1); }
          50% { transform: scale(1.05); }
          100% { transform: scale(1); }
        }
      </style>
      <div style="background-color: var(--bg-splash); background-image: radial-gradient(var(--pattern-color) 1.5px, transparent 1.5px); background-size: 20px 20px; background-position: 0 0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden;">
        <div style="background-color: #ffffff; border: 4px solid #000; border-radius: 16px; padding: 40px 60px; box-shadow: 8px 8px 0px #000; display: flex; flex-direction: column; align-items: center; gap: 20px;">
          
          <img src="/logo.png" alt="CasYuk Logo" style="width: 80px; height: 80px; animation: pulse-logo 2s ease-in-out infinite; border: 3px solid #000; border-radius: 12px; box-shadow: 3px 3px 0px #000; background: #fff;" />

          <div style="font-weight: 800; font-size: 1.5rem; color: #000; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px;">CasYuk</div>

          <!-- Custom Battery Loader -->
          <div style="position: relative; width: 80px; height: 36px; border: 4px solid #000; border-radius: 8px; padding: 3px;">
            <div style="position: absolute; right: -8px; top: 50%; transform: translateY(-50%); width: 4px; height: 16px; background: #000; border-radius: 0 4px 4px 0;"></div>
            <div style="height: 100%; background-color: #a6f6d0; border-radius: 4px; animation: battery-fill 1.5s ease-in-out infinite alternate;"></div>
          </div>
          
          <div style="font-weight: 600; font-size: 0.85rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px;">Waking up...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
